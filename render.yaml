services:
  - type: web
    name: UnderGrad
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_WALLET_PRIVATE_KEY
        sync: false
      - key: AGENT_WALLET_ADDRESS
        sync: false
      - key: ENTITY_ID
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ACCESS_CODE_1
        sync: false
      - key: ACCESS_CODE_2
        sync: false
